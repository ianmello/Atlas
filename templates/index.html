<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Qual é o seu próximo destino?</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700&display=swap" rel="stylesheet" />
  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    html, body {
      height: 100%;
      font-family: Arial, sans-serif;
      color: white;
      overflow: hidden;
    }

    .logo {
    position: absolute;
    top: 5px;
    left: 20px;
    height: 120px; /* ou ajuste conforme o tamanho da sua logo */
    z-index: 2;
    user-select: none;
  }


    .background-layer {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-size: cover;
      background-position: center;
      transition: opacity 1s ease-in-out;
      z-index: -1;
      opacity: 0;
    }

    .background-layer.active {
      opacity: 1;
    }

    .container {
      position: relative;
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 0 20px;
      text-align: center;
      z-index: 1;
    }

    h1 {
      font-weight: 900;
      font-family: 'Poppins', sans-serif;
      font-size: 4.5rem;
      line-height: 1.1;
      text-transform: uppercase;
      max-width: 700px;
    }

    .search-box {
      margin-top: 30px;
      width: 480px;
      max-width: 90vw;
      background: rgba(255, 255, 255, 0.25);
      border-radius: 20px;
      padding: 12px 20px;
      display: flex;
      align-items: center;
      color: #e3e3e3;
      font-size: 1rem;
      transition: background-color 0.3s ease;
    }

    .search-box input {
      background: transparent;
      font-family: 'Poppins', sans-serif;
      border: none;
      outline: none;
      flex: 1;
      color: white;
      font-size: 1.3rem;
      font-weight: 400;
    }

    .search-box input::placeholder {
      color: #c7c7c7;
    }

    .search-box button {
      background: transparent;
      border: none;
      cursor: pointer;
      color: white;
      font-size: 1.4rem;
      font-weight: bold;
      transform: rotate(-45deg);
    }
  </style>
</head>
<body>

<div id="bg1" class="background-layer active"></div>
<div id="bg2" class="background-layer"></div>

<div class="container" id="bg-container">
  <h1>QUAL SERÁ SEU<br>PRÓXIMO<br>DESTINO?</h1>
  <form class="search-box" onsubmit="event.preventDefault(); alert('Buscar: ' + this.query.value);">
    <input type="text" name="query" placeholder="Explore um destino" />
    <button type="submit" aria-label="Buscar">&#8593;</button>
  </form>
</div>

<script>
  const backgrounds = [
    'https://images.unsplash.com/photo-1506744038136-46273834b3fb?auto=format&fit=crop&w=1470&q=80',
    'https://images.unsplash.com/photo-1507525428034-b723cf961d3e?fm=jpg&q=60&w=3000',
    'https://images.unsplash.com/photo-1498307833015-e7b400441eb8?fm=jpg&q=60&w=3000',
    'https://images.unsplash.com/photo-1528164344705-47542687000d?fm=jpg&q=60&w=3000',
    'https://images.unsplash.com/photo-1499678329028-101435549a4e?q=80&w=2070&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D',
    'https://images.unsplash.com/photo-1747593555870-b6923886e785?q=80&w=2071&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D',
    'https://images.unsplash.com/photo-1516306580123-e6e52b1b7b5f?q=80&w=2126&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D',

  ];

  const placeholderTexts = [
    "Explore lugares fantásticos...",
    "Descubra cidades incríveis...",
    "Encontre paisagens maravilhosas...",
    "Faça sua viagem dos sonhos...",
    "Viva experiências inesqueciveis...",
    "O mundo te espera, apenas faça...",
    "Transforme seu sonho em um roteiro...",
  ];

  const themeColors = [
    { text: "#FFF5EB", box: "rgba(0, 0, 0, 0.6)" },
    { text: "#ffffff", box: "rgba(63, 121, 132, 0.6)" },
    { text: "#ffffff", box: "rgba(0, 0, 0, 0.6)" },
    { text: "#f5f5dc", box: "rgba(50, 50, 50, 0.4)" },
    { text: "#ffffff", box: "rgba(0, 0, 0, 0.6)" },
    { text: "#0A1E37", box: "rgba(0, 0, 0, 0.3)" },
    { text: "#ffffff", box: "rgba(0, 0, 0, 0.4s)" },
  ];

  let current = 0;
  let activeIndex = 0;
  const bgElements = [document.getElementById('bg1'), document.getElementById('bg2')];
  const container = document.getElementById('bg-container');
  const h1 = container.querySelector("h1");
  const searchBox = document.querySelector(".search-box");
  const input = searchBox.querySelector("input");
  const button = searchBox.querySelector("button");

  function typeWriter(text, element, speed = 75) {
    let i = 0;
    element.placeholder = "";
    const interval = setInterval(() => {
      if (i < text.length) {
        element.placeholder += text.charAt(i);
        i++;
      } else {
        clearInterval(interval);
      }
    }, speed);
  }

  function changeBackground() {
    const next = (current + 1) % backgrounds.length;
    const nextBg = bgElements[1 - activeIndex];
    const currentBg = bgElements[activeIndex];

    nextBg.style.backgroundImage = `url('${backgrounds[next]}')`;
    nextBg.classList.add('active');
    currentBg.classList.remove('active');

    current = next;
    activeIndex = 1 - activeIndex;

    const theme = themeColors[current];
    h1.style.color = theme.text;
    searchBox.style.backgroundColor = theme.box;
    searchBox.style.color = theme.text;
    input.style.color = theme.text;
    input.style.caretColor = theme.text;
    button.style.color = theme.text;

    typeWriter(placeholderTexts[current], input);
  }

  bgElements[activeIndex].style.backgroundImage = `url('${backgrounds[current]}')`;
  typeWriter(placeholderTexts[current], input);
  setInterval(changeBackground, 8000);
</script>

</body>

<img src="{{ url_for('static', filename='atlas_logo.png') }}" alt="Logo" class="logo" />

</html>
